name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Cache Astro build
        uses: actions/cache@v4
        with:
          path: .astro
          key: astro-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'astro.config.mjs', 'tsconfig.json') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - name: Install dependencies
        run: bun ci

      - name: Lint and format check
        run: bun biome ci
        continue-on-error: true

      - name: Check
        run: bun run check
      - name: Test
        run: bun test

      - name: Build
        run: bun run build
